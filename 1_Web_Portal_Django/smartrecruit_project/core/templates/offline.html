{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Interrupted | SmartRecruit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0b10;
            --electric-cyan: #00d2ff;
        }
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .offline-card {
            background: rgba(17, 25, 40, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 2rem;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.1);
        }
        .pulse-icon {
            font-size: 4rem;
            color: var(--electric-cyan);
            margin-bottom: 2rem;
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px var(--electric-cyan)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--electric-cyan)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--electric-cyan)); }
        }
        .btn-glass {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--electric-cyan);
            color: var(--electric-cyan);
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-glass:hover {
            background: var(--electric-cyan);
            color: #000;
            box-shadow: 0 0 30px var(--electric-cyan);
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="pulse-icon"><i class="fas fa-wifi-slash"></i></div>
        <h1 class="display-5 fw-bold mb-3">Neuro-Link Interrupted</h1>
        <p class="text-secondary mb-4">The recruitment matrix requires an active internet connection for real-time AI sync. Don't worry, your progress is cached locally.</p>
        <button onclick="window.location.reload()" class="btn btn-glass fw-bold">RE-ESTABLISH LINK</button>
    </div>
</body>
</html>
