{% if page_obj.has_other_pages %}
<div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top border-theme border-opacity-25">
    <div class="text-muted small">
        Showing page <strong class="text-theme">{{ page_obj.number }}</strong> of {{ page_obj.paginator.num_pages }} 
        <span class="ms-2">(Total items: {{ page_obj.paginator.count }})</span>
    </div>
    <div class="btn-group shadow-sm">
        {% if page_obj.has_previous %}
            <a href="?page={{ page_obj.previous_page_number }}{% for key,value in request.GET.items %}{% if key != 'page' %}&{{ key }}={{ value }}{% endif %}{% endfor %}" class="btn btn-outline-primary btn-sm px-3"><i class="fas fa-chevron-left me-1"></i> Prev</a>
        {% else %}
            <button class="btn btn-outline-secondary btn-sm px-3 border-opacity-25" disabled><i class="fas fa-chevron-left me-1"></i> Prev</button>
        {% endif %}
        
        {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}{% for key,value in request.GET.items %}{% if key != 'page' %}&{{ key }}={{ value }}{% endif %}{% endfor %}" class="btn btn-outline-primary btn-sm px-3">Next <i class="fas fa-chevron-right ms-1"></i></a>
        {% else %}
            <button class="btn btn-outline-secondary btn-sm px-3 border-opacity-25" disabled>Next <i class="fas fa-chevron-right ms-1"></i></button>
        {% endif %}
    </div>
</div>
{% endif %}
