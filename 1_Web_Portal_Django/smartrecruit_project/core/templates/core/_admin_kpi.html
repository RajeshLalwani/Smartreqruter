<!-- KPI Card Partial: include with value/label/icon/color/sub/sub_label -->
<div class="col-6 col-lg-3">
  <div class="glass-card p-4 h-100 position-relative overflow-hidden">
    <div class="d-flex align-items-start justify-content-between">
      <div>
        <p class="text-theme-secondary mb-1" style="font-size:.75rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase;">{{ label }}</p>
        <h2 class="fw-bold text-white mb-0" style="font-size:2rem;">{{ value }}</h2>
        {% if sub_label %}
        <small class="text-theme-secondary">
          <i class="fa-solid fa-arrow-up text-success me-1" style="font-size:.7rem;"></i>
          {{ sub }} {{ sub_label }}
        </small>
        {% endif %}
      </div>
      <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
           style="width:48px;height:48px;background:{% if color == 'primary' %}rgba(99,102,241,.2){% elif color == 'info' %}rgba(0,210,255,.2){% elif color == 'warning' %}rgba(245,158,11,.2){% elif color == 'success' %}rgba(16,185,129,.2){% elif color == 'cyan' %}rgba(0,229,255,.2){% elif color == 'purple' %}rgba(139,92,246,.2){% elif color == 'danger' %}rgba(239,68,68,.2){% else %}rgba(255,255,255,.1){% endif %}">
        <i class="fa-solid {{ icon }}"
           style="color:{% if color == 'primary' %}#818cf8{% elif color == 'info' %}#00d2ff{% elif color == 'warning' %}#f59e0b{% elif color == 'success' %}#10b981{% elif color == 'cyan' %}#00e5ff{% elif color == 'purple' %}#8b5cf6{% elif color == 'danger' %}#ef4444{% else %}#94a3b8{% endif %}; font-size:1.2rem;"></i>
      </div>
    </div>
  </div>
</div>
