<div class="kanban-card" data-id="{{ app.id }}" data-name="{{ app.candidate.full_name|lower }}" data-job="{{ app.job.title|lower }}">
    
    <div class="d-flex justify-content-between align-items-start mb-2">
        <!-- Avatar Initial -->
        <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-primary border border-primary border-opacity-25 bg-primary bg-opacity-10 shadow-inner flex-shrink-0" style="width: 34px; height: 34px; font-size: 0.85rem; font-family: 'Space Grotesk', sans-serif;">
            {{ app.candidate.full_name|slice:":1"|upper }}
        </div>
        
        <!-- AI Score Badge -->
        {% if app.ai_score >= 70 %}
        <span class="badge bg-success bg-opacity-25 text-success border border-success border-opacity-50 rounded-pill fw-bold" style="font-size: 0.65rem;">{{ app.ai_score }}%</span>
        {% elif app.ai_score >= 50 %}
        <span class="badge bg-warning bg-opacity-25 text-warning border border-warning border-opacity-50 rounded-pill fw-bold" style="font-size: 0.65rem;">{{ app.ai_score }}%</span>
        {% else %}
        <span class="badge bg-danger bg-opacity-25 text-danger border border-danger border-opacity-50 rounded-pill fw-bold" style="font-size: 0.65rem;">{{ app.ai_score }}%</span>
        {% endif %}
    </div>

    <h6 class="fw-bold text-white mb-1 text-truncate" style="font-size: 0.9rem;">{{ app.candidate.full_name }}</h6>
    <p class="text-secondary mb-2 text-truncate" style="font-size: 0.72rem;">
        <i class="fas fa-briefcase me-1 opacity-50"></i>{{ app.job.title }}
    </p>

    <div class="d-flex justify-content-between align-items-center pt-2 mt-1 border-top border-light border-opacity-10">
        <span class="text-muted font-monospace" style="font-size: 0.6rem;">
            <i class="fas fa-clock me-1 opacity-50"></i>{{ app.updated_at|date:"M d" }}
        </span>
        <a href="{% url 'application_details' app.id %}" class="btn btn-sm rounded-pill px-2 py-0 text-primary hover-scale" style="font-size: 0.65rem; background: rgba(41,121,255,0.1); border: 1px solid rgba(41,121,255,0.3);">
            <i class="fas fa-eye me-1"></i>View
        </a>
    </div>
</div>
